<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dining</title>

    <!--Bootstrap and Custom CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--Navigation-->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a href="index.html" class="navbar-brand">Home</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Dining Options</h2>

        <!--Dining Card Example-->
        <!--Each card represents a dining location-->
        <div class="card p-3 mb-3">
            <h4>Student Center Cafe</h4>
            <p>Menu: PIzza, Salad, Drinks</p>
            <!--Button triggers JavaScript function to save preferences-->
            <button onclick="saveFavorites('Student Center Cafe')" class="btn btn-success">Save Favorite</button>
        </div>

        <div class="card p-3">
            <h4>Main Dining Hall</h4>
            <p>Menu: Burgers, Fries, Vegan Options</p>
            <!--Save to localStorage-->
            <button onclick="saveFavorites('Main Dining Hall')" class="btn btn-success">Save Favorite</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
